[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "sh -c 'uvicorn app.health_server:app --host 0.0.0.0 --port 8001 & streamlit run app/frontend.py --server.port=$PORT --server.address=0.0.0.0 --server.headless=true'"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
